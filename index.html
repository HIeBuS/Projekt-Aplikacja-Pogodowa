<!DOCTYPE html>
<html lang="en">
<head>
    <title>Weather App</title>
    <meta name="author" content="Dawid Aleksiejuk, Jakub Hlebowicz">
    <meta name="description" content="Minimalistic weather web app built with HTML, CSS and JavaScript. Uses wttr.in API, async data fetching, localStorage, weekly forecast and favourite cities.">    
    <meta name="robots" content="index, follow">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <!-- Weather icons created by iconixar - Flaticon -->
    <link rel="shortcut icon" href="img/favicon.ico" type="image/x-icon">

    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <script src="js/script.js" defer></script>
</head>

<body>
    <!-- Header -->
    <header class="header">
        <!-- Navbar -->
        <nav class="navbar">
            
            <div class="navbar-logo">
                <i class="fa-solid fa-cloud-sun"></i> 
                <span>WeatherApp</span>
            </div>

            <div class="navbar-actions desktop-only">
                <div class="search-bar">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" placeholder="Search">
                </div>
                <button class="btn">
                    <i class="fa-solid fa-location-dot"></i> My Location
                </button>
                <button class="btn">
                    <i class="fa-solid fa-shuffle"></i> RANDOM
                </button>
            </div>

            <div class="navbar-info desktop-only">
                <span class="date">THURSDAY, 4 DEC 2025</span>
                <div class="divider"></div> 
                <div class="unit-toggle">
                    <button class="unit-btn is-active">°C</button> 
                    <button class="unit-btn">°F</button>
                </div>
            </div>

            <button class="hamburger mobile-only">
                <i class="fa-solid fa-bars"></i>
            </button>

        </nav>
    </header>

    <!-- Main Container Start-->
    <main class="container">
        <div class="layout-grid">
            <!-- Weather Dashboard -->
            <section class="weather-dashboard"></section>

            <!-- Weekly Forecast -->
            <section class="weekly-forecast"></section>

            <!-- Favourite Locations  -->
            <aside class="favourite-locations"></aside>
        </div>
    </main>
    <!-- Main Container End-->

    <!-- Footer -->
    <footer class="footer"></footer>

    <!-- Mobile Fullscreen Menu Overlay -->
    <div class="mobile-menu-overlay"></div>
</body>
</html>
